run:
  timeout: 5m
  go: "1.22"

linters:
  disable-all: true
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused
    - gofmt
    - goimports
    - gocritic
    - revive
    - misspell
    - unconvert
    - bodyclose
    - nolintlint

linters-settings:
  goimports:
    local-prefixes: github.com/arogan178/bitbucket-cli
  revive:
    rules:
      - name: exported
        disabled: true

issues:
  exclude-rules:
    - path: _test\.go
      linters: [errcheck, bodyclose]
